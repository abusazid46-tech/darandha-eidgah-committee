<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Darandha Eidgah Committee</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a5f3e 0%, #0d3b26 100%);
            color: white;
        }
        .offline-container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 400px;
            margin: 20px;
        }
        .offline-container i {
            font-size: 80px;
            margin-bottom: 20px;
            color: #c9a03d;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            opacity: 0.9;
        }
        .btn-retry {
            background: #c9a03d;
            color: #1a3c2a;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        .btn-retry:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <i class="fas fa-wifi-slash"></i>
        <h1>You're Offline</h1>
        <p>Please check your internet connection and try again.</p>
        <p>Previously visited pages may still be available.</p>
        <button class="btn-retry" onclick="location.reload()">
            <i class="fas fa-sync-alt me-2"></i>Try Again
        </button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></script>
</body>
</html>
