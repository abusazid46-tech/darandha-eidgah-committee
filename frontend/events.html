<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Darandha Eidgah Committee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --islamic-green: #1a5f3e;
            --islamic-gold: #c9a03d;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f0e8;
        }
        
        .navbar {
            background-color: var(--islamic-green);
        }
        
        .event-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s;
            margin-bottom: 30px;
        }
        
        .event-card:hover {
            transform: translateY(-5px);
        }
        
        .event-image {
            height: 250px;
            object-fit: cover;
            width: 100%;
        }
        
        .event-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .badge-today { background: #ff4757; color: white; }
        .badge-upcoming { background: #1a5f3e; color: white; }
        .badge-past { background: #6c757d; color: white; }
        
        .category-tab {
            cursor: pointer;
            padding: 10px 25px;
            border-radius: 30px;
            transition: all 0.3s;
        }
        
        .category-tab.active {
            background: var(--islamic-green);
            color: white;
        }
        
        .category-tab:not(.active):hover {
            background: #e0d5c5;
        }
        
        .event-time {
            color: var(--islamic-gold);
            font-weight: 600;
        }
        
        footer {
            background: #0d3b26;
            color: white;
            padding: 40px 0;
            margin-top: 50px;
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand text-white" href="index.html">
            <i class="fas fa-mosque me-2"></i> Darandha Eidgah Committee
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white active" href="events.html">Events</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero Section -->
<section class="hero" style="background: linear-gradient(135deg, #1a5f3e, #0d3b26); color: white; padding: 100px 0 60px; margin-top: 56px;">
    <div class="container text-center">
        <h1><i class="fas fa-calendar-alt me-3"></i>Events & Programs</h1>
        <p class="lead">Stay updated with our community events, programs, and activities</p>
    </div>
</section>

<!-- Category Navigation -->
<section class="py-4">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-auto">
                <div class="d-flex gap-3 flex-wrap justify-content-center">
                    <div class="category-tab active" data-category="all">
                        <i class="fas fa-list me-2"></i>All Events
                    </div>
                    <div class="category-tab" data-category="today">
                        <i class="fas fa-calendar-day me-2"></i>Today's Events
                    </div>
                    <div class="category-tab" data-category="upcoming">
                        <i class="fas fa-calendar-week me-2"></i>Upcoming Events
                    </div>
                    <div class="category-tab" data-category="past">
                        <i class="fas fa-history me-2"></i>Past Events
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Events Container -->
<section class="py-4">
    <div class="container">
        <div id="eventsContainer" class="row">
            <div class="col-12 text-center">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<footer>
    <div class="container text-center">
        <p>&copy; 2024 Darandha Eidgah Committee. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = 'https://darandha-eidgah-committee.onrender.com/api';
    let currentCategory = 'all';

    // Load events based on category
    async function loadEvents() {
        const container = document.getElementById('eventsContainer');
        container.innerHTML = '<div class="col-12 text-center"><div class="spinner-border text-success"></div></div>';
        
        try {
            let url = `${API_URL}/events`;
            if (currentCategory !== 'all') {
                url = `${API_URL}/events/category/${currentCategory}`;
            }
            
            const res = await fetch(url);
            const events = await res.json();
            
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fas fa-calendar-times fa-4x text-muted mb-3"></i>
                        <h4>No events found</h4>
                        <p class="text-muted">Check back later for upcoming events</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = events.map(event => `
                <div class="col-md-6 col-lg-4">
                    <div class="event-card">
                        <div style="position: relative;">
                            ${event.image ? 
                                `<img src="${API_URL.replace('/api', '')}${event.image}" class="event-image" alt="${event.title}">` :
                                `<div class="event-image bg-light d-flex align-items-center justify-content-center">
                                    <i class="fas fa-calendar-alt fa-4x text-muted"></i>
                                </div>`
                            }
                            <span class="event-badge badge-${event.category}">
                                ${event.category === 'today' ? 'Today' : event.category === 'upcoming' ? 'Upcoming' : 'Past'}
                            </span>
                        </div>
                        <div class="p-4">
                            <h4>${event.title}</h4>
                            <div class="event-time mb-2">
                                <i class="far fa-calendar-alt me-2"></i>${new Date(event.date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                            </div>
                            ${event.time ? `
                                <div class="mb-2">
                                    <i class="far fa-clock me-2"></i>${event.time} ${event.endTime ? `- ${event.endTime}` : ''}
                                </div>
                            ` : ''}
                            ${event.location ? `
                                <div class="mb-3">
                                    <i class="fas fa-location-dot me-2"></i>${event.location}
                                </div>
                            ` : ''}
                            <p class="text-muted">${event.description || 'No description available'}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Error loading events:', error);
            container.innerHTML = `
                <div class="col-12 text-center py-5">
                    <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
                    <h4>Error loading events</h4>
                    <p>Please try again later</p>
                </div>
            `;
        }
    }

    // Category tabs
    document.querySelectorAll('.category-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentCategory = tab.getAttribute('data-category');
            loadEvents();
        });
    });

    // Initial load
    loadEvents();
</script>
</body>
</html>
